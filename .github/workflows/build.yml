name: Build Geode Mod

on: [push, workflow_dispatch]

jobs:
  build:
    name: Build Android Mod
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          bindings: true
          platform: android
          sdk: v4.0.0
          
