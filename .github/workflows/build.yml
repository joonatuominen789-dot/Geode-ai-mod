name: Build Geode Mod

on: [push, workflow_dispatch]

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build Android Mod
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          platform: android
          sdk: v3.0.0
          ndk: 26.1.10909125
