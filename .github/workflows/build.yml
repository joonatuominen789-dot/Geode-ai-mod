name: Build Geode Mod

on: [push, workflow_dispatch]

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build Android Mod
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@v3
        with:
          platform: android
